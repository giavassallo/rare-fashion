<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rare Fashion Co.</title>
    <meta name="viewport" content="width=devicde-width, initial-scale">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #000000;
            color: #ffffff;
        }

        h1, h5, p {
            color: #ffffff;
        }

        .product-card {
            background-color: #1c1c1c;
            border: 1px solid #2e2e2e;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255,255,255,0.1)
        }

        .product-img {
            transition: transform 0.3s ease;
            height: 300px;
            object-fit: cover;
        }

        .product-img:hover {
            transform: scale(1.08);
        }

        .card-text {
            color: #bbbbbb;
        }

        .btn-custom {
            background-color: #2e2e2e;
            color: white;
            border: 1px solid #444;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #444;
            box-shadow: 0 0 10px rgba(255,255,255,0.2)
        }

        footer {
            background-color: #111111;
            border-top: 1px solid #2e2e2e;
            padding: 40px 0;
        }

        .form-control {
            background-color: #1c1c1c;
            border: 1px solid #333;
            color: white;
        }

        .form-control::placeholder {
            color: #777;
        }

        .form-control:focus {
            background-color: #1c1c1c;
            color: white;
            border-color: #555;
            box-shadow: none;
        } 
        
        .company-logo {
            width: 80px;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <h1 class="text-center mb-5">Rare Fashion Co.</h1>

        <div class="row g-4">

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="furcoat.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Fur Coat">

                    <div class="card-body">
                        <h5 class="card-title">Fur Coat</h5>
                        <p class="card-text">$500</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="leatherdress.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Leather Dress">

                    <div class="card-body">
                        <h5 class="card-title">Leather Dress</h5>
                        <p class="card-text">$200</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="leatherheelboots.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Leather Boots">

                    <div class="card-body">
                        <h5 class="card-title">Leather Boots</h5>
                        <p class="card-text">$150</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="blackleatherpurse.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Leather Purse">

                    <div class="card-body">
                        <h5 class="card-title">Leather Purse</h5>
                        <p class="card-text">$100</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="italiantrench.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Trench Coat">

                    <div class="card-body">
                        <h5 class="card-title">Trench Coat</h5>
                        <p class="card-text">$200</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="brownsweaterdress.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Sweater Dress">

                    <div class="card-body">
                        <h5 class="card-title">Sweater Dress</h5>
                        <p class="card-text">$150</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="brownleatherboots.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Brown Boots">

                    <div class="card-body">
                        <h5 class="card-title">Brown Boots</h5>
                        <p class="card-text">$100</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="goldbrowndress.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Gold Gala Dress">

                    <div class="card-body">
                        <h5 class="card-title">Gold Gala Dress</h5>
                        <p class="card-text">$400</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="gold heels.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Gold Heels">

                    <div class="card-body">
                        <h5 class="card-title">Gold Heels</h5>
                        <p class="card-text">$200</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card h-100 text-center">
                    <img src="goldclutch.jpg"
                        class="card-img-top img-fluid product-img"
                        alt="Gold Clutch">

                    <div class="card-body">
                        <h5 class="card-title">Gold Clutch</h5>
                        <p class="card-text">$100</p>
                        <button class="btn btn-custom">Buy</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

<footer>
    <div class="container">
        <div class="row align-items-center">

            <div class="col-md-2 text-center text-md-start mb-3 mb-md-0">
                <img src="logo.jpg"
                    alt="Company Logo"
                    class="company-logo">
            </div>

            <div class="col-md-10">
                <form class="row g-3">

                    <div class="col-md-4">
                        <input type="text" class="form-control" placeholder="Full Name">
                    </div>

                    <div class="col-md-4">
                        <input type="email" class="form-control" placeholder="Email Address">
                    </div>

                    <div class="col-md-4">
                        <input type="tel" class="form-control" placeholder="Phone Number">
                    </div>

                    <div class="col-12 text-md-end">
                        <button type="submit" class="btn btn-custom">
                            Submit
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</footer>


</body>
</html>
